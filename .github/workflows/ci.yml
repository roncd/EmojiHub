name: CI - EmojiHub

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ develop, main ]

jobs:

  # === STOCKAGE SERVICE ===
  test-stockage:
    name: Tests stockage-service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ secrets.DB_NAME }}
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stockage-service/package-lock.json

      - name: Installation des dépendances
        working-directory: stockage-service
        run: npm ci

      - name: Linting
        working-directory: stockage-service
        run: npm run lint

      - name: Création des tables
        working-directory: stockage-service
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          psql -h localhost -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} -f migration/init.sql

      - name: Tests unitaires
        working-directory: stockage-service
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: npm test

  # === API SERVICE ===
  test-api:
    name: Tests api-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-service/package-lock.json

      - name: Installation des dépendances
        working-directory: api-service
        run: npm ci

      - name: Linting
        working-directory: api-service
        run: npm run lint

      - name: Tests unitaires
        working-directory: api-service
        env:
          PORT: 3000
          STOCKAGE_URL: http://localhost:5001
        run: npm test
  
  # === Docker Build ===
  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-stockage, test-api]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API image
        run: docker build -t api-service ./api-service

      - name: Build stockage image
        run: docker build -t stockage-service ./stockage-service

      - name: Build analysis image
        run: docker build -t analyse-service ./analyse-service


  # === Génération documentation API ===
  generate-docs:
    name: Génération documentation API
    runs-on: ubuntu-latest
    needs: test-api
    if: github.ref_name == 'main' 
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install deps
        working-directory: api-service
        run: npm ci

      - name: Generate Swagger JSON
        working-directory: api-service
        run: npm run generate-swagger

      - name: Generate Markdown docs
        working-directory: api-service
        run: npm run generate-md

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: |
            api-service/docs/api.md
            api-service/docs/swagger.json
        
      - name: Commit generated docs
        working-directory: api-service
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/swagger.json docs/api.md
          git diff --staged --quiet || git commit -m "docs: génération automatique Swagger"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}